<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0f1117;
            color: #e6e8ee;
        }

        /* ---------- NAV BAR ---------- */
        nav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 16px 32px;
            background: rgba(20, 23, 33, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #7c5cff, #4dd0e1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 480px;
        }

        .search-wrap svg {
            position: absolute;
            top: 50%;
            left: 16px;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: #8b90a0;
        }

        nav input[type="text"] {
            width: 100%;
            padding: 12px 16px 12px 44px;
            font-size: 15px;
            color: #e6e8ee;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            outline: none;
            transition: all 0.2s ease;
        }

        nav input[type="text"]::placeholder {
            color: #8b90a0;
        }

        nav input[type="text"]:focus {
            border-color: #7c5cff;
            background: rgba(124, 92, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.15);
        }

        /* ---------- PRODUCTS CONTAINER ---------- */
        #preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ---------- PRODUCT CARD ---------- */
        .card {
            background: linear-gradient(180deg, #1a1e2b, #171a26);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(124, 92, 255, 0.5);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .card .name {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
            color: #f4f5f9;
        }

        .card .category {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4dd0e1;
            background: rgba(77, 208, 225, 0.1);
            padding: 4px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .card .brand {
            font-size: 14px;
            color: #9aa0b0;
        }

        .card .brand span {
            color: #cfd3df;
            font-weight: 500;
        }

        .card-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
        }

        .card .price {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
        }

        .card .stock {
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 999px;
        }

        .stock.in {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.12);
        }

        .stock.out {
            color: #f87171;
            background: rgba(248, 113, 113, 0.12);
        }
    </style>
</head>
<body>
    <nav>
        <div class="brand">ShopHub</div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" placeholder="Search products..." oninput="search()">
        </div>
    </nav>

    <div id="preview">

     

    </div>

</body>
</html>
<script>
    let preview = document.getElementById('preview')

    const products = [
        { name: "Wireless Mouse",        price: 25.99,  category: "Electronics", brand: "Logitech",    inStock: true },
        { name: "Mechanical Keyboard",   price: 89.99,  category: "Electronics", brand: "Keychron",    inStock: true },
        { name: "USB-C Charger",         price: 19.99,  category: "Accessories", brand: "Anker",       inStock: false },
        { name: "Bluetooth Speaker",     price: 45.50,  category: "Audio",       brand: "JBL",         inStock: true },
        { name: "Noise-Cancelling Headphones", price: 199.00, category: "Audio",  brand: "Sony",        inStock: true },
        { name: "Laptop Stand",          price: 34.95,  category: "Accessories", brand: "Rain Design", inStock: true },
        { name: "4K Monitor",            price: 329.99, category: "Electronics", brand: "Dell",        inStock: false },
        { name: "Webcam HD",             price: 59.99,  category: "Electronics", brand: "Logitech",    inStock: true },
        { name: "Gaming Chair",          price: 249.00, category: "Furniture",   brand: "Secretlab",   inStock: true },
        { name: "Standing Desk",         price: 399.00, category: "Furniture",   brand: "Flexispot",   inStock: false },
        { name: "Smartphone",            price: 699.00, category: "Mobile",      brand: "Samsung",     inStock: true },
        { name: "Tablet",                price: 449.00, category: "Mobile",      brand: "Apple",       inStock: true },
        { name: "Smart Watch",           price: 199.99, category: "Wearables",   brand: "Fitbit",      inStock: true },
        { name: "Portable SSD 1TB",      price: 109.99, category: "Storage",     brand: "Samsung",     inStock: false },
        { name: "Wireless Earbuds",      price: 129.99, category: "Audio",       brand: "Apple",       inStock: true },
        { name: "External Hard Drive",   price: 64.99,  category: "Storage",     brand: "Seagate",     inStock: true },
        { name: "HDMI Cable",            price: 9.99,   category: "Accessories", brand: "Amazon",      inStock: true },
        { name: "Router",                price: 79.99,  category: "Networking",  brand: "TP-Link",     inStock: true }
    ];


  function displayAllProducts() {
      products.forEach(( product , i )=> {

     preview.innerHTML += `<div class="card">
            <div class="card-top">
                <div class="name">${product.name.length <= 6 ? product.name : product.name.slice(0 , 7) + '...'} </div>
                <div class="category">${product.category}</div>
            </div>
            <div class="brand">by <span>${product.brand}</span></div>
            <div class="card-bottom">
                <div class="price">$${product.price}</div>
                <div class="stock in">${product.inStock  ?  'In Stock' : 'Out of Stock'}</div>
            </div>
        </div>
        `
    })
  }


  displayAllProducts()

    function search() {
  let searchValue = searchInput.value.trim().toLowerCase() // MeC // mec

  let filteredProducts = products.filter((product)=> {  return product.name.toLowerCase().includes(searchValue)  || product.category.toLowerCase().includes(searchValue) })

  preview.innerHTML = ''

  if (filteredProducts.length === 0 ) {
    preview.innerHTML = 'product does not exist'
  }else {

 filteredProducts.forEach((product)=> {

    preview.innerHTML += `<div class="card">
            <div class="card-top">
                <div class="name">${product.name.length <= 6 ? product.name : product.name.slice(0 , 7) + '...'} </div>
                <div class="category">${product.category}</div>
            </div>
            <div class="brand">by <span>${product.brand}</span></div>
            <div class="card-bottom">
                <div class="price">$${product.price}</div>
                <div class="stock in">${product.inStock  ?  'In Stock' : 'Out of Stock'}</div>
            </div>
        </div>`
  })

  }
 
 
  

    }



</script>
