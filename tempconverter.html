<script>


function calculate(e) {
   let inputValue = e.target.previousElementSibling.value.trim()

    if (inputValue === '') {
        alert('input must not be empty')
    } else {
        let farenheit = (+inputValue * (9/5)) + 32
        let outputElement = e.target.nextElementSibling
        outputElement.innerHTML = `${farenheit}oF`


    }

    
}
