function mostPopulatedCountries( countries , num ) {
    let orderedCountries = countries.sort((a , b )=>  b.population  - a.population )
    
   let onlyCountryandPopulation = orderedCountries.map(( country )=> { return  {country: country.name , population:country.population}} )


   let onlyNeededCountries = onlyCountryandPopulation.filter((country , i )=> { return i < num })

   
    return  onlyNeededCountries


}


console.log(mostPopulatedCountries(countries , 20 ));

function mostSpokenLanguages( countries , num) {
    let orderedCountries = countries.sort((a , b )=>  b.languages.length  - a.languages.length )
    // console.log(orderedCountries);
    
    
   let onlyCountryandCount = orderedCountries.map(( country )=> { return  {country: country.name , count:country.languages.length}} )
console.log(onlyCountryandCount);


   let onlyNeededCountries = onlyCountryandCount.filter((country , i )=> { return i < num })

   
    return  onlyNeededCountries


}
