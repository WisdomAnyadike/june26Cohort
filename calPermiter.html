 <input type="text" id="width">

<script>

    function displayPerimeter(params) {

        preview.innerHTML = `the perimeter of a rectangle with a length
         of ${len.value.trim()}m and a width of ${width.value.trim()}m is
          ${calPerimeter(+len.value.trim() , +width.value.trim() )}m `
        
    }




function calPerimeter(l , w) {
    return 2 * (l + w)
}
