<script>
    let allTodos = []
    let todoInput = document.getElementById('todoInput')
    let previewDiv = document.getElementById('preview')

    function createTodo() {
   let todoValue = todoInput.value.trim() 
   allTodos.push(todoValue)
   displayTodo()
   todoInput.value = '' 
    }


    function editTodo(w) {
        console.log(`go and edit the value on index ${w}`);  
    }

    function deleteTodo(i) {
        allTodos.splice(i , 1)
       displayTodo()
    }


function displayTodo() {
    previewDiv.innerHTML = ''
   for (let index = 0; index < allTodos.length; index++) {
  previewDiv.innerHTML +=   `<p> ${allTodos[index]} <button onclick="editTodo(${index})"> edit </button> <button onclick="deleteTodo(${index})"> x </button> </p>`
   }
}
